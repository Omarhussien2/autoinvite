<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أوتو إنفايت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'IBM+Plex+Sans+Arabic', sans-serif;
        }
    </style>
</head>

<body
    style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a, #1e293b);">

    <div class="card"
        style="width: 100%; max-width: 400px; padding: 2.5rem; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; color: white;">مرحباً بعودتك 👋</h1>
            <p style="color: var(--text-muted);">سجل دخولك عشان تبدأ شغلك وإبداعك</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" style="width: 100%; margin-top: 1rem;">دخول</button>
        </form>

        <p id="error-msg" style="color: var(--error-color); text-align: center; margin-top: 1rem; display: none;"></p>

        <div
            style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← الرجوع
                للرئيسية</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.textContent = 'المعلومات غلط، تأكد وجرب ثاني!';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'في مشكلة في الاتصال، شيك النت.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
