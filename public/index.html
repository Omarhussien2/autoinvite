<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - أوتو إنفايت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div class="brand">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <h1>أوتو<span>إنفايت</span></h1>
                </a>
                <p id="status-text">جاري الاتصال...</p>
            </div>
            <div class="user-controls" style="display: flex; gap: 12px; align-items: center;">
                <a href="/" class="btn-small">🏠 الرئيسية</a>
                <a href="/create_campaign.html" class="btn-small"
                    style="background: var(--primary-color); border-color: var(--primary-color);">+ حملة جديدة</a>

                <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 8px;"></div>

                <span id="username-display" style="color: #94a3b8; font-size: 0.85rem;"></span>
                <button id="logout-btn" class="btn-small"
                    style="background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.4);">خروج</button>
            </div>
        </header>

        <!-- QR Code Section -->
        <div id="qr-container" class="card hidden" style="text-align: center;">
            <h2>اربط الواتساب</h2>
            <p>امسح الكود عشان نبدأ الشغل</p>
            <img id="qr-image" src="" alt="WhatsApp QR Code"
                style="margin: 20px auto; display: block; border-radius: 10px;">
        </div>

        <!-- My Campaigns Section -->
        <div id="campaigns-container" class="card hidden">
            <h3 style="margin-top: 0;">📋 حملاتي</h3>
            <div id="campaigns-list" style="display: grid; gap: 10px;">
                <!-- Campaigns will be loaded here -->
                <p style="color: var(--text-muted);">جاري تحميل الحملات...</p>
            </div>
        </div>

        <!-- Controls Section -->
        <div id="controls-container" class="card hidden">

            <!-- Quick Test Section -->
            <div
                style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--border-color);">
                <h3 style="margin-top: 0; font-size: 1rem;">🧪 تجربة سريعة (Testing)</h3>
                <div class="control-row" style="margin-top: 10px;">
                    <input type="text" id="testPhone" placeholder="الرقم مع الكود (مثلاً 2011xxxxx)" style="flex: 2;">
                    <button id="test-btn" class="btn-small" style="background: var(--secondary-color);">إرسال تجربة
                        📨</button>
                </div>
            </div>

            <div class="control-row">
                <div class="input-group">
                    <label>من صف رقم #</label>
                    <input type="number" id="startRow" value="2" min="1">
                </div>
                <div class="input-group">
                    <label>الى صف رقم #</label>
                    <input type="number" id="endRow" value="100" min="1">
                </div>
                <button id="start-btn">🚀 أطلق الحملة</button>
                <button id="stop-btn" class="btn-small"
                    style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: rgba(239, 68, 68, 0.4); display: none;">⏹️
                    إيقاف</button>
            </div>
        </div>

        <!-- Logs Section -->
        <div class="card logs-container">
            <h3>📜 سجل العمليات (مباشر)</h3>
            <div id="logs-area"></div>
        </div>
    </div>

    <script src="client.js"></script>
</body>

</html>
