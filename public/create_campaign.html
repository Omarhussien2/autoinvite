<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حملة جديدة - أوتو إنفايت</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .canvas-wrapper {
            background: #1e293b;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 2px dashed var(--border-color);
            position: relative;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .message-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: right;
        }

        .message-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            text-align: right;
            direction: rtl;
        }

        .message-box textarea:focus {
            outline: none;
        }

        .add-msg-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            width: 100%;
            padding: 0.5rem;
            cursor: pointer;
        }

        .add-msg-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .remove-msg {
            color: var(--error-color);
            font-size: 0.8rem;
            cursor: pointer;
            float: left;
            /* Changed for RTL */
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <div class="brand">
                <a href="/dashboard" style="text-decoration: none; color: inherit;">
                    <h1>حملة<span>جديدة</span></h1>
                </a>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="/" class="btn-small"
                    style="background: transparent; border: 1px solid var(--border-color);">الرئيسية</a>
                <a href="/dashboard" class="btn-small">رجوع للوحة التحكم ↩️</a>
            </div>
        </header>

        <main class="editor-container">
            <!-- Right: Settings (RTL swaps columns visually, but grid stays same order in HTML) -->
            <div class="card">
                <h2>تجهيز الحملة</h2>
                <form id="campaign-form">
                    <div class="input-group">
                        <label>اسم المناسبة / الحملة</label>
                        <input type="text" id="campName" placeholder="مثلاً: عيد الفطر 1447" required
                            style="text-align: right;">
                    </div>

                    <div class="input-group">
                        <label>صورة الدعوة (القالب)</label>
                        <input type="file" id="imgUpload" accept="image/*" required>
                    </div>

                    <div class="input-group">
                        <label>ملف الأرقام (Excel / CSV)</label>
                        <input type="file" id="contactsUpload" accept=".csv, .xlsx, .xls" required>
                        <small style="color: var(--text-muted); display: block; margin-top: 5px;">تأكد إن الملف فيه عمود
                            "Name" وعمود "Phone".</small>
                    </div>

                    <div class="input-group">
                        <label>تنويع الرسائل <small>(عشان ما يجيك حظر)</small></label>
                        <small style="color: var(--primary-color); display: block; margin-bottom: 10px;">💡 استخدم <code
                                style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">[الاسم]</code>
                            في الرسالة وسيتم استبداله باسم كل ضيف تلقائياً.</small>
                        <div id="messages-list">
                            <div class="message-box">
                                <span class="remove-msg">x</span>
                                <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                                    <select class="msg-weight"
                                        style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: white; padding: 5px; border-radius: 5px;">
                                        <option value="3">🌟 أولوية عالية (50%)</option>
                                        <option value="2">⚖️ متوسطة (30%)</option>
                                        <option value="1">🔽 منخفضة (20%)</option>
                                    </select>
                                </div>
                                <textarea name="message[]"
                                    placeholder="حياك الله يا [Name]، يشرفنا حضورك..."></textarea>
                            </div>
                        </div>
                        <button type="button" id="addMsgBtn" class="add-msg-btn">+ رسالة جديدة</button>
                    </div>

                    <div style="margin-top: 2rem;">
                        <button type="submit">إطلاق الحملة 🚀</button>
                    </div>
                </form>
            </div>

            <!-- Left: Visual Editor -->
            <div class="card">
                <h2>المصمم الذكي</h2>
                <p style="color: var(--text-muted); margin-bottom: 1rem;">
                    ارفع الصورة، وبعدين <strong>اسحب الاسم</strong> وحطه في المكان المناسب على البطاقة.
                </p>

                <div class="canvas-wrapper" id="canvas-container">
                    <p id="placeholder-text">تنتظر الصورة...</p>
                    <canvas id="previewCanvas"></canvas>
                </div>

                <div class="input-group" style="margin-top: 1rem; display: flex; gap: 1rem;">
                    <div>
                        <label>حجم الخط</label>
                        <input type="number" id="fontSize" value="60">
                    </div>
                    <div>
                        <label>اللون</label>
                        <input type="color" id="fontColor" value="#000000" style="height: 50px; cursor: pointer;">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="create_campaign.js"></script>
</body>

</html>
