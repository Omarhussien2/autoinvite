# ════════════════════════════════════════════════════════════════════
#  AutoInvite SaaS — Nginx Production Configuration
#  File location on VPS: /etc/nginx/sites-available/autoinvite
#  Enable: sudo ln -s /etc/nginx/sites-available/autoinvite /etc/nginx/sites-enabled/
# ════════════════════════════════════════════════════════════════════

# Rate limiting zone (anti-abuse for auth endpoints)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# Upstream Node.js app
upstream autoinvite_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Certbot ACME challenge for SSL certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL Certificates (issued by Certbot) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request Limits ────────────────────────────────────────────
    client_max_body_size 50M;        # Max upload size (invitation images + Excel files)
    client_body_timeout  60s;
    client_header_timeout 10s;
    keepalive_timeout    65s;

    # ── Static Files (served directly by Nginx, bypasses Node) ───
    location /js/ {
        root /var/www/autoinvite/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
        root /var/www/autoinvite/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri @nodejs;
    }

    # ── Socket.IO WebSocket — CRITICAL: Must be before the catch-all ──
    # Socket.IO uses both WebSocket AND long-polling fallback.
    # Both require these specific proxy headers.
    location /socket.io/ {
        proxy_pass         http://autoinvite_backend;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy headers
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Socket.IO specific timeouts
        proxy_read_timeout    86400s;   # 24h — critical for long-lived WS connections
        proxy_send_timeout    86400s;
        proxy_connect_timeout 75s;

        # Disable buffering for real-time logs
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Auth endpoints — rate limited ─────────────────────────────
    location ~ ^/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://autoinvite_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints — rate limited ──────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://autoinvite_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # Long timeout for campaign batch operations
    }

    # ── All other requests → Node.js ─────────────────────────────
    location / {
        proxy_pass         http://autoinvite_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Fallback for static assets ────────────────────────────────
    location @nodejs {
        proxy_pass http://autoinvite_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Deny hidden files ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/autoinvite.access.log;
    error_log  /var/log/nginx/autoinvite.error.log warn;
}
